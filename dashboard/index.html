<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Orders Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>Orders Dashboard</h1>
  <div style="width: 100%; height: 600px;">
  <canvas id="chart"></canvas>
</div>
  <pre id="debug"></pre>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://ppawsqstspjihzgxbwhx.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwYXdzcXN0c3BqaWh6Z3hid2h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzI4NjQsImV4cCI6MjA5MTcwODg2NH0.34ZaPLEtPbsbOFJUE1C27b6AhGStK3HqpgktS7HxIZk'

    const debug = document.getElementById('debug')
    debug.textContent =
      'URL: ' + supabaseUrl + '\n' +
      'KEY PREFIX: ' + supabaseKey.slice(0, 30)

    const supabase = createClient(supabaseUrl, supabaseKey)

    async function loadData() {
      const { data, error } = await supabase
        .from('orders')
        .select('*')
        .order('created_at', { ascending: true })

      if (error) {
        console.error(error)
        debug.textContent += '\nERROR: ' + error.message
        return
      }

      debug.textContent += '\nROWS: ' + data.length

      const labels = data.map(o => o.number)
      const values = data.map(o => Number(o.total_sum || 0))

    new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels,
            datasets: [{
            label: 'Сумма заказа',
            data: values
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
            padding: {
                left: 10,
                right: 10,
                top: 10,
                bottom: 10
            }
            },
            scales: {
            x: {
                title: {
                display: true,
                text: 'Заказы',
                color: '#000',
                font: {
                    size: 16,
                    weight: 'bold'
                }
                }
            },
            y: {
                beginAtZero: true,
                title: {
                display: true,
                text: 'Сумма',
                color: '#000',
                font: {
                    size: 16,
                    weight: 'bold'
                }
                }
            }
            }
        }
        })
    }

    loadData()
    const byDay = {}

    data.forEach(o => {
    const date = o.created_at.split('T')[0]
    byDay[date] = (byDay[date] || 0) + o.total_sum
    })
    setInterval(loadData, 5000)
  </script>
</body>
</html>
